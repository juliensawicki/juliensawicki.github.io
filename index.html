<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio RT - Julien Sawicki | BUT Réseaux et Télécommunications</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============================================
           VARIABLES CSS + RESET + BASE
        ============================================ */
        :root {
            /* Couleurs principales */
            --bg-primary: #06060a;
            --bg-secondary: #0f0f15;
            --bg-tertiary: #1a1a25;
            --bg-quaternary: #232330;
            --bg-card: #12121a;

            /* Couleurs d'accentuation */
            --accent: #ff3b5c;
            --accent-secondary: #00d4ff;
            --accent-tertiary: #a855f7;
            --accent-quaternary: #f59e0b;

            /* Couleurs de statut */
            --green: #10b981;
            --green-dark: #059669;
            --green-light: #d1fae5;
            --orange: #f59e0b;
            --orange-dark: #d97706;
            --orange-light: #fef3c7;
            --red: #ef4444;
            --red-dark: #dc2626;
            --red-light: #fee2e2;
            --blue: #3b82f6;
            --blue-dark: #2563eb;
            --blue-light: #dbeafe;
            --purple: #8b5cf6;
            --purple-dark: #7c3aed;
            --purple-light: #e9d5ff;

            /* Texte */
            --text: #f8fafc;
            --text-secondary: #94a3b8;
            --text-dim: #64748b;
            --text-dark: #1e293b;

            /* Bordures et ombres */
            --border: #334155;
            --border-light: #475569;
            --shadow: rgba(0, 0, 0, 0.3);
            --shadow-glow: rgba(255, 59, 92, 0.2);
            --shadow-glow-blue: rgba(0, 212, 255, 0.2);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-strong: rgba(255, 255, 255, 0.08);

            /* Espacements */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 20px;
            --spacing-2xl: 24px;
            --spacing-3xl: 32px;
            --spacing-4xl: 40px;
            --spacing-5xl: 48px;

            /* Bordures */
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-2xl: 20px;
            --radius-full: 9999px;

            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
            --transition-bounce: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 10% 80%, rgba(255, 59, 92, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 20%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(168, 85, 247, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        /* ============================================
           HEADER + NAVIGATION
        ============================================ */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: var(--spacing-4xl) var(--spacing-xl);
        }

        header {
            text-align: center;
            margin-bottom: var(--spacing-5xl);
            position: relative;
            padding: var(--spacing-xl) 0;
        }

        header h1 {
            font-size: 4rem;
            margin-bottom: var(--spacing-md);
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary), var(--accent-tertiary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1.1;
        }

        header h1 i {
            margin-right: var(--spacing-md);
            color: var(--accent-secondary);
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: var(--spacing-md);
        }

        .student-info {
            display: flex;
            justify-content: center;
            gap: var(--spacing-xl);
            margin-top: var(--spacing-lg);
            flex-wrap: wrap;
        }

        .info-badge {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-sm) var(--spacing-md);
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .info-badge i {
            color: var(--accent-secondary);
        }

        header::after {
            content: "";
            display: block;
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent-secondary), var(--accent-tertiary));
            margin: var(--spacing-xl) auto;
            border-radius: var(--radius-full);
            box-shadow: 0 0 20px var(--shadow-glow);
        }

        /* ============================================
           FILTRES + RECHERCHE
        ============================================ */
        .controls {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-5xl);
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: var(--spacing-md);
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: var(--spacing-sm) var(--spacing-lg);
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-normal);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            font-weight: 500;
        }

        .filter-btn:hover {
            background: var(--bg-quaternary);
            color: var(--text);
            border-color: var(--accent-secondary);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            color: var(--text);
            border-color: transparent;
            box-shadow: 0 0 15px var(--shadow-glow);
        }

        .filter-btn i {
            font-size: 0.85rem;
        }

        .search-container {
            display: flex;
            justify-content: center;
            max-width: 700px;
            margin: 0 auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-xl);
            padding-left: 40px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            color: var(--text);
            font-size: 1rem;
            transition: all var(--transition-normal);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-secondary);
            box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.1);
        }

        .search-input::placeholder {
            color: var(--text-dim);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 1rem;
        }

        /* ============================================
           STATISTIQUES GLOBALES
        ============================================ */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-5xl);
        }

        .stat-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            text-align: center;
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
            transform: scaleX(0);
            transition: transform var(--transition-normal);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px var(--shadow);
            border-color: var(--accent-secondary);
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-card i {
            font-size: 2rem;
            color: var(--accent-secondary);
            margin-bottom: var(--spacing-md);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: var(--spacing-xs);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* ============================================
           GRID DES COMPÉTENCES
        ============================================ */
        .competences-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-5xl);
        }

        /* Cartes des compétences */
        .competence-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl);
            cursor: pointer;
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px var(--shadow);
        }

        .competence-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent-secondary), var(--accent-tertiary));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform var(--transition-normal);
        }

        .competence-card:hover::before {
            transform: scaleX(1);
        }

        .competence-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px var(--shadow);
            border-color: var(--accent-secondary);
        }

        .competence-card::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 59, 92, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity var(--transition-normal);
            pointer-events: none;
            z-index: -1;
        }

        .competence-card:hover::after {
            opacity: 1;
        }

        .competence-card h2 {
            color: var(--text);
            margin-bottom: var(--spacing-md);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-weight: 700;
        }

        .competence-card h2 i {
            color: var(--accent-secondary);
            font-size: 1.3rem;
        }

        .competence-card .summary {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-lg);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .competence-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
            flex-wrap: wrap;
            gap: var(--spacing-sm);
        }

        .competence-card .semester-tag {
            background: var(--bg-tertiary);
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            color: var(--text-dim);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .competence-card .semester-tag i {
            color: var(--accent-secondary);
        }

        .competence-card .status-overview {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
            flex-wrap: wrap;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-full);
            font-weight: 600;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            transition: all var(--transition-fast);
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
        }

        .competence-card:hover .status-badge {
            transform: scale(1.05);
        }

        .ok {
            color: var(--green);
            border-color: var(--green);
            background: rgba(16, 185, 129, 0.1);
        }

        .mid {
            color: var(--orange);
            border-color: var(--orange);
            background: rgba(245, 158, 11, 0.1);
        }

        .no {
            color: var(--red);
            border-color: var(--red);
            background: rgba(239, 68, 68, 0.1);
        }

        .passable {
            color: var(--blue);
            border-color: var(--blue);
            background: rgba(59, 130, 246, 0.1);
        }

        .competence-card .progress-container {
            margin-top: var(--spacing-lg);
        }

        .competence-card .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--spacing-xs);
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .competence-card .progress-bar {
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            overflow: hidden;
            margin-bottom: var(--spacing-sm);
        }

        .competence-card .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-secondary), var(--accent-tertiary));
            border-radius: var(--radius-sm);
            transition: width var(--transition-slow);
        }

        /* ============================================
           MODAL
        ============================================ */
        .modal {
            display: none;
            position: fixed;
            z-index: 4000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            animation: fadeIn var(--transition-normal);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--bg-secondary);
            margin: 2% auto;
            padding: 0;
            border-radius: var(--radius-2xl);
            width: 90%;
            max-width: 1200px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 25px 50px var(--shadow);
            border: 1px solid var(--border);
            animation: slideIn var(--transition-normal);
            position: relative;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: var(--spacing-xl) var(--spacing-2xl);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-tertiary);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .modal-header h2 {
            color: var(--text);
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-weight: 700;
        }

        .modal-header h2 i {
            color: var(--accent-secondary);
        }

        .close {
            color: var(--text-dim);
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-fast);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-full);
            background: transparent;
        }

        .close:hover {
            color: var(--text);
            background: var(--glass-strong);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: var(--spacing-xl);
            max-height: calc(90vh - 80px);
            overflow-y: auto;
        }

        /* Onglets */
        .tabs {
            display: flex;
            gap: var(--spacing-xs);
            margin-bottom: var(--spacing-xl);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            padding-bottom: var(--spacing-sm);
        }

        .tab {
            padding: var(--spacing-sm) var(--spacing-lg);
            background: transparent;
            color: var(--text-secondary);
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: all var(--transition-fast);
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            position: relative;
            font-weight: 500;
        }

        .tab::after {
            content: "";
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-secondary);
            transform: scaleX(0);
            transition: transform var(--transition-fast);
        }

        .tab.active {
            color: var(--accent-secondary);
        }

        .tab.active::after {
            transform: scaleX(1);
        }

        .tab:hover {
            color: var(--text);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeInContent var(--transition-normal);
        }

        @keyframes fadeInContent {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Contenu des onglets */
        .tab-content h3 {
            color: var(--text);
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 1.3rem;
            font-weight: 700;
        }

        .tab-content h3 i {
            color: var(--accent-secondary);
        }

        .tab-content h4 {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-md);
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Bilan */
        .bilan-content {
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .bilan-content p {
            margin-bottom: var(--spacing-lg);
        }

        /* Ressources */
        .ressources-content {
            display: grid;
            gap: var(--spacing-md);
        }

        .ressource-item {
            background: var(--bg-tertiary);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            border-left: 3px solid var(--accent-secondary);
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
        }

        .ressource-item::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.05));
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .ressource-item:hover {
            background: var(--glass-strong);
            transform: translateX(5px);
        }

        .ressource-item:hover::before {
            opacity: 1;
        }

        .ressource-item h4 {
            color: var(--text);
            margin-bottom: var(--spacing-sm);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 1rem;
            font-weight: 600;
        }

        .ressource-item h4 i {
            color: var(--accent-secondary);
        }

        .ressource-item .ressource-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-sm);
        }

        .ressource-item .ressource-code {
            font-weight: 700;
            color: var(--accent-secondary);
        }

        .ressource-item .ressource-meta {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-sm);
            font-size: 0.85rem;
            color: var(--text-dim);
            flex-wrap: wrap;
        }

        .ressource-item .semester-badge {
            background: var(--bg-quaternary);
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            border: 1px solid var(--border);
        }

        .ressource-item .status-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            font-weight: 600;
        }

        .ressource-item .bilan-ressource {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-top: var(--spacing-sm);
            padding-left: var(--spacing-md);
            position: relative;
            line-height: 1.6;
        }

        .ressource-item .bilan-ressource::before {
            content: "»";
            color: var(--accent);
            position: absolute;
            left: 0;
        }

        /* Niveaux */
        .niveaux-content {
            display: grid;
            gap: var(--spacing-lg);
        }

        .niveau-section {
            background: var(--bg-tertiary);
            padding: var(--spacing-lg);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
        }

        .niveau-section h4 {
            color: var(--orange);
            margin-bottom: var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 1.1rem;
            font-weight: 600;
        }

        .niveau-section h4 i {
            color: var(--accent-secondary);
        }

        .niveau-section ul {
            list-style: none;
            padding-left: var(--spacing-md);
        }

        .niveau-section li {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-sm);
            position: relative;
            padding-left: var(--spacing-md);
            line-height: 1.6;
        }

        .niveau-section li::before {
            content: "•";
            color: var(--accent);
            position: absolute;
            left: 0;
        }

        .niveau-section li:hover {
            color: var(--text);
        }

        /* Evaluations */
        .evaluations-content {
            display: grid;
            gap: var(--spacing-md);
        }

        .evaluation-item {
            background: var(--bg-tertiary);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            border-left: 3px solid var(--purple);
            transition: all var(--transition-fast);
        }

        .evaluation-item:hover {
            background: var(--glass-strong);
            transform: translateX(5px);
        }

        .evaluation-item h4 {
            color: var(--text);
            margin-bottom: var(--spacing-sm);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 1rem;
            font-weight: 600;
        }

        .evaluation-item h4 i {
            color: var(--purple);
        }
