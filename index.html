<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio RT - Compétences Complètes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============================================
           VARIABLES CSS + RESET
        ============================================ */
        :root {
            /* Couleurs principales */
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --bg-quaternary: #232330;
            --accent: #ff3b5c;
            --accent-secondary: #00d4ff;
            --accent-tertiary: #a855f7;
            --green: #00ff88;
            --green-dark: #00cc6a;
            --orange: #ffb020;
            --orange-dark: #e09600;
            --red: #ff4d4d;
            --red-dark: #cc3d3d;
            --text: #ffffff;
            --text-secondary: #b0b0b0;
            --text-dim: #888888;
            --text-dark: #333333;
            --border: #2a2a3a;
            --border-light: #3a3a4a;
            --shadow: rgba(0, 0, 0, 0.3);
            --shadow-glow: rgba(255, 59, 92, 0.2);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-strong: rgba(255, 255, 255, 0.1);

            /* Espacements */
            --spacing-xs: 5px;
            --spacing-sm: 10px;
            --spacing-md: 15px;
            --spacing-lg: 20px;
            --spacing-xl: 25px;
            --spacing-2xl: 30px;
            --spacing-3xl: 40px;

            /* Bordures */
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 50%;

            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
        }

        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 80%, rgba(255, 59, 92, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(168, 85, 247, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        /* ============================================
           HEADER + NAVIGATION
        ============================================ */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--spacing-xl);
        }

        header {
            text-align: center;
            margin-bottom: var(--spacing-3xl);
            position: relative;
            padding: var(--spacing-xl) 0;
        }

        header h1 {
            font-size: 3.5rem;
            margin-bottom: var(--spacing-md);
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary), var(--accent-tertiary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
            letter-spacing: -1px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.2rem;
            font-weight: 400;
        }

        header::after {
            content: "";
            display: block;
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent-secondary), var(--accent-tertiary));
            margin: var(--spacing-lg) auto;
            border-radius: var(--radius-full);
            box-shadow: 0 0 20px var(--shadow-glow);
        }

        /* Filtres */
        .filters {
            display: flex;
            justify-content: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-2xl);
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: var(--spacing-sm) var(--spacing-lg);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-normal);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .filter-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text);
            border-color: var(--accent-secondary);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            color: var(--text);
            border-color: transparent;
            box-shadow: 0 0 15px var(--shadow-glow);
        }

        .filter-btn i {
            font-size: 0.8rem;
        }

        /* Barre de recherche */
        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: var(--spacing-2xl);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-input {
            width: 100%;
            padding: var(--spacing-md) var(--spacing-lg);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text);
            font-size: 1rem;
            transition: all var(--transition-normal);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-secondary);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .search-input::placeholder {
            color: var(--text-dim);
        }

        /* ============================================
           GRID DES COMPÉTENCES
        ============================================ */
        .competences-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: var(--spacing-xl);
            margin-top: var(--spacing-xl);
        }

        /* Cartes des compétences */
        .competence-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            cursor: pointer;
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px var(--shadow);
        }

        .competence-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-secondary), var(--accent-tertiary));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform var(--transition-normal);
        }

        .competence-card:hover::before {
            transform: scaleX(1);
        }

        .competence-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px var(--shadow);
            border-color: var(--accent-secondary);
        }

        .competence-card::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 59, 92, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity var(--transition-normal);
            pointer-events: none;
            z-index: -1;
        }

        .competence-card:hover::after {
            opacity: 1;
        }

        .competence-card h2 {
            color: var(--text);
            margin-bottom: var(--spacing-md);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-weight: 700;
        }

        .competence-card h2 i {
            color: var(--accent-secondary);
            font-size: 1.2rem;
        }

        .competence-card .summary {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-lg);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .competence-card .status-overview {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
            flex-wrap: wrap;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-full);
            font-weight: 600;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            transition: all var(--transition-fast);
            background: var(--bg-tertiary);
        }

        .competence-card:hover .status-badge {
            transform: scale(1.05);
        }

        .ok {
            color: var(--green);
            border: 1px solid var(--green);
        }

        .mid {
            color: var(--orange);
            border: 1px solid var(--orange);
        }

        .no {
            color: var(--red);
            border: 1px solid var(--red);
        }

        .competence-card .progress-container {
            margin-top: var(--spacing-lg);
        }

        .competence-card .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--spacing-xs);
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .competence-card .progress-bar {
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            overflow: hidden;
            margin-bottom: var(--spacing-sm);
        }

        .competence-card .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-secondary), var(--accent-tertiary));
            border-radius: var(--radius-sm);
            transition: width var(--transition-slow);
        }

        .competence-card .semester-tag {
            position: absolute;
            top: var(--spacing-md);
            right: var(--spacing-md);
            background: var(--bg-tertiary);
            padding: var(--spacing-xs) var(--spacing-sm);
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        /* ============================================
           MODAL
        ============================================ */
        .modal {
            display: none;
            position: fixed;
            z-index: 3000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            animation: fadeIn var(--transition-normal);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--bg-secondary);
            margin: 3% auto;
            padding: 0;
            border-radius: var(--radius-xl);
            width: 90%;
            max-width: 1000px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 20px 40px var(--shadow);
            border: 1px solid var(--border);
            animation: slideIn var(--transition-normal);
            position: relative;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: var(--spacing-xl);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-tertiary);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .modal-header h2 {
            color: var(--text);
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-weight: 700;
        }

        .modal-header h2 i {
            color: var(--accent-secondary);
        }

        .close {
            color: var(--text-dim);
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all var(--transition-fast);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-full);
            background: transparent;
        }

        .close:hover {
            color: var(--text);
            background: var(--glass-strong);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: var(--spacing-xl);
            max-height: calc(90vh - 100px);
            overflow-y: auto;
        }

        /* Onglets */
        .tabs {
            display: flex;
            gap: var(--spacing-xs);
            margin-bottom: var(--spacing-xl);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            padding-bottom: var(--spacing-sm);
        }

        .tab {
            padding: var(--spacing-sm) var(--spacing-lg);
            background: transparent;
            color: var(--text-secondary);
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: all var(--transition-fast);
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            position: relative;
        }

        .tab::after {
            content: "";
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-secondary);
            transform: scaleX(0);
            transition: transform var(--transition-fast);
        }

        .tab.active {
            color: var(--accent-secondary);
        }

        .tab.active::after {
            transform: scaleX(1);
        }

        .tab:hover {
            color: var(--text);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeInContent var(--transition-normal);
        }

        @keyframes fadeInContent {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Contenu des onglets */
        .bilan-content, .ressources-content, .niveaux-content {
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .bilan-content h3, .ressources-content h3, .niveaux-content h3 {
            color: var(--green);
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 1.2rem;
        }

        .bilan-content h3 i, .ressources-content h3 i, .niveaux-content h3 i {
            color: var(--accent-secondary);
        }

        /* Ressources */
        .ressources-content {
            display: grid;
            gap: var(--spacing-md);
        }

        .ressource-item {
            background: var(--bg-tertiary);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            border-left: 3px solid var(--accent-secondary);
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
        }

        .ressource-item::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.05));
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .ressource-item:hover {
            background: var(--glass-strong);
            transform: translateX(5px);
        }

        .ressource-item:hover::before {
            opacity: 1;
        }

        .ressource-item h4 {
            color: var(--text);
            margin-bottom: var(--spacing-sm);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 1rem;
        }

        .ressource-item h4 i {
            color: var(--accent-secondary);
        }

        .ressource-item .ressource-meta {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-sm);
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .ressource-item .semester-tag {
            background: var(--bg-quaternary);
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
        }

        .ressource-item .bilan-ressource {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-top: var(--spacing-sm);
            padding-left: var(--spacing-md);
            position: relative;
        }

        .ressource-item .bilan-ressource::before {
            content: "»";
            color: var(--accent);
            position: absolute;
            left: 0;
        }

        /* Niveaux */
        .niveaux-content {
            display: grid;
            gap: var(--spacing-lg);
        }

        .niveau-section {
            background: var(--bg-tertiary);
            padding: var(--spacing-lg);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
        }

        .niveau-section h4 {
            color: var(--orange);
            margin-bottom: var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 1.1rem;
        }

        .niveau-section h4 i {
            color: var(--accent-secondary);
        }

        .niveau-section ul {
            list-style: none;
            padding-left: var(--spacing-md);
        }

        .niveau-section li {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-sm);
            position: relative;
            padding-left: var(--spacing-md);
        }

        .niveau-section li::before {
            content: "•";
            color: var(--accent);
            position: absolute;
            left: 0;
        }

        .niveau-section li:hover {
            color: var(--text);
        }

        /* Scrollbar personnalisée */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: var(--radius-sm);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Tooltip */
        .tooltip {
            position: relative;
            display: inline-block;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 200px;
            background-color: var(--bg-tertiary);
            color: var(--text-secondary);
            text-align: center;
            border-radius: var(--radius-sm);
            padding: var(--spacing-sm);
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity var(--transition-fast);
            border: 1px solid var(--border);
            font-size: 0.8rem;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        /* Badge de semestre */
        .semester-badge {
            display: inline-block;
            padding: 2px 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-left: var(--spacing-xs);
        }

        /* ============================================
           RESPONSIVE
        ============================================ */
        @media (max-width: 1200px) {
            .competences-grid {
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: var(--spacing-md);
            }

            header h1 {
                font-size: 2.2rem;
            }

            header p {
                font-size: 1rem;
            }

            .competences-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                width: 95%;
                margin: 5% auto;
            }

            .modal-header h2 {
                font-size: 1.4rem;
            }

            .filters {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-btn {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.8rem;
            }

            .competence-card h2 {
                font-size: 1.3rem;
            }

            .modal-header h2 {
                font-size: 1.2rem;
            }

            .tab {
                padding: var(--spacing-sm) var(--spacing-md);
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-network-wired"></i> Portfolio RT - Compétences</h1>
            <p>BUT Réseaux et Télécommunications | Parcours Cybersécurité | Julien Sawicki</p>
        </header>

        <!-- Filtres -->
        <div class="filters">
            <button class="filter-btn active" onclick="filterCompetences('all')">
                <i class="fas fa-th"></i> Toutes
            </button>
            <button class="filter-btn" onclick="filterCompetences('semestre1')">
                <i class="fas fa-graduation-cap"></i> Semestre 1
            </button>
            <button class="filter-btn" onclick="filterCompetences('semestre2')">
                <i class="fas fa-graduation-cap"></i> Semestre 2
            </button>
            <button class="filter-btn" onclick="filterCompetences('acquis')">
                <i class="fas fa-check-circle"></i> Acquis
            </button>
            <button class="filter-btn" onclick="filterCompetences('encours')">
                <i class="fas fa-clock"></i> En cours
            </button>
            <button class="filter-btn" onclick="filterCompetences('nonacquis')">
                <i class="fas fa-times-circle"></i> Non acquis
            </button>
        </div>

        <!-- Barre de recherche -->
        <div class="search-container">
            <input type="text" class="search-input" placeholder="🔍 Rechercher une compétence, ressource ou SAÉ..." oninput="searchCompetences()">
        </div>

        <!-- Grille des compétences -->
        <div class="competences-grid" id="competencesGrid">
            <!-- Les cartes seront générées dynamiquement par JavaScript -->
        </div>
    </div>

    <!-- Modal -->
    <div id="competenceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"><i class="fas fa-server"></i> Compétence</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab(event, 'bilan')">
                        <i class="fas fa-chart-line"></i> Bilan
                    </button>
                    <button class="tab" onclick="switchTab(event, 'ressources')">
                        <i class="fas fa-book"></i> Ressources
                    </button>
                    <button class="tab" onclick="switchTab(event, 'niveaux')">
                        <i class="fas fa-layer-group"></i> Niveaux
                    </button>
                    <button class="tab" onclick="switchTab(event, 'situations')">
                        <i class="fas fa-briefcase"></i> Situations
                    </button>
                </div>

                <div id="bilan" class="tab-content active">
                    <div class="bilan-content">
                        <h3><i class="fas fa-comment-alt"></i> Bilan général</h3>
                        <p id="bilanText"></p>
                    </div>
                </div>

                <div id="ressources" class="tab-content">
                    <div class="ressources-content" id="ressourcesContent">
                        <!-- Les ressources seront ajoutées dynamiquement -->
                    </div>
                </div>

                <div id="niveaux" class="tab-content">
                    <div class="niveaux-content" id="niveauxContent">
                        <!-- Les niveaux seront ajoutées dynamiquement -->
                    </div>
                </div>

                <div id="situations" class="tab-content">

                    }
                ],
                niveaux: {
                    "Niveau 2 - Développer une application R&T": [
                        "AC23.01 | Automatiser l’administration système avec des scripts",
                        "AC23.02 | Développer une application à partir d’un cahier des charges donné, pour le Web ou les périphériques mobiles",
                        "AC23.03 | Utiliser un protocole réseau pour programmer une application client/serveur",
                        "AC23.04 | Installer, administrer un système de gestion de données",
                        "AC23.05 | Accéder à un ensemble de données depuis une application et/ou un site web"
                    ],
                    "Niveau 3 - Piloter un projet de développement": [
                        "AC33.01 | Élaborer les spécifications techniques et le cahier des charges d’une application informatique",
                        "AC33.02 | Mettre en place un environnement de travail collaboratif",
                        "AC33.03 | Participer à la formation des utilisateurs",
                        "AC33.04 | Déployer et maintenir une solution informatique",
                        "AC33.05 | S’informer sur les évolutions technologiques",
                        "AC33.06 | Sécuriser l'environnement numérique d'une application"
                    ]
                }
            }
        };

        // ============================================
        // FONCTIONS PRINCIPALES
        // ============================================

        // Générer les cartes des compétences
        function generateCompetenceCards() {
            const grid = document.getElementById('competencesGrid');
            grid.innerHTML = '';

            for (const [key, competence] of Object.entries(competencesData)) {
                const card = document.createElement('div');
                card.className = 'competence-card';
                card.setAttribute('data-semester', competence.semester.toLowerCase());
                card.setAttribute('data-status', JSON.stringify(competence.status));
                card.onclick = () => openModal(key);

                const total = competence.status.ok + competence.status.mid + competence.status.no;
                const progress = (competence.status.ok + competence.status.mid * 0.5) / total * 100;

                card.innerHTML = `
                    <h2><i class="fas ${competence.icon}"></i> ${competence.title}</h2>
                    <div class="summary">${competence.bilan.substring(0, 100)}...</div>
                    <div class="status-overview">
                        <span class="status-badge ok tooltip"><i class="fas fa-check-circle"></i> ${competence.status.ok} Acquis
                            <span class="tooltiptext">Compétences maîtrisées</span>
                        </span>
                        <span class="status-badge mid tooltip"><i class="fas fa-clock"></i> ${competence.status.mid} En cours
                            <span class="tooltiptext">Compétences en progression</span>
                        </span>
                        <span class="status-badge no tooltip"><i class="fas fa-times-circle"></i> ${competence.status.no} Non acquis
                            <span class="tooltiptext">Compétences à acquérir</span>
                        </span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-label">
                            <span>Progression</span>
                            <span>${Math.round(progress)}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%;"></div>
                        </div>
                    </div>
                    <div class="semester-tag">${competence.semester}</div>
                `;

                grid.appendChild(card);
            }
        }

        // Ouvrir la modal
        function openModal(competenceKey) {
            const competence = competencesData[competenceKey];
            document.getElementById('modalTitle').innerHTML = `<i class="fas ${competence.icon}"></i> ${competence.title}`;
            document.getElementById('bilanText').textContent = competence.bilan;

            // Remplir les situations
            const situationsList = document.getElementById('situationsList');
            situationsList.innerHTML = competence.situations.map(situation => `<li>${situation}</li>`).join('');

            // Remplir les ressources
            const ressourcesContent = document.getElementById('ressourcesContent');
            ressourcesContent.innerHTML = competence.ressources.map(resource => `
                <div class="ressource-item">
                    <h4><i class="fas fa-file-alt"></i> ${resource.code} - ${resource.nom} <span class="semester-badge">${resource.semester}</span></h4>
                    <div class="ressource-meta">
                        <span class="status-badge ${resource.status}">${getStatusText(resource.status)}</span>
                    </div>
                    <div class="bilan-ressource">${resource.bilan}</div>
                </div>
            `).join('');

            // Remplir les niveaux
            const niveauxContent = document.getElementById('niveauxContent');
            niveauxContent.innerHTML = Object.entries(competence.niveaux).map(([niveau, acs]) => `
                <div class="niveau-section">
                    <h4><i class="fas fa-level-up-alt"></i> ${niveau}</h4>
                    <ul>
                        ${acs.map(ac => `<li>${ac}</li>`).join('')}
                    </ul>
                </div>
            `).join('');

            // Afficher la modal
            document.getElementById('competenceModal').style.display = 'block';
        }

        // Fermer la modal
        function closeModal() {
            document.getElementById('competenceModal').style.display = 'none';
        }

        // Changer d'onglet
        function switchTab(event, tabName) {
            const tabContents = document.getElementsByClassName('tab-content');
            for (let i = 0; i < tabContents.length; i++) {
                tabContents[i].classList.remove('active');
            }

            const tabs = document.getElementsByClassName('tab');
            for (let i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove('active');
            }

            document.getElementById(tabName).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Filtrer les compétences
        function filterCompetences(filter) {
            const cards = document.querySelectorAll('.competence-card');
            const searchTerm = document.querySelector('.search-input').value.toLowerCase();

            cards.forEach(card => {
                const semester = card.getAttribute('data-semester');
                const status = JSON.parse(card.getAttribute('data-status'));
                const text = card.textContent.toLowerCase();

                let shouldShow = true;

                if (filter === 'semestre1') {
                    shouldShow = semester === 'semestre 1';
                } else if (filter === 'semestre2') {
                    shouldShow = semester === 'semestre 2';
                } else if (filter === 'acquis') {
                    shouldShow = status.ok > 0;
                } else if (filter === 'encours') {
                    shouldShow = status.mid > 0;
                } else if (filter === 'nonacquis') {
                    shouldShow = status.no > 0;
                }

                if (searchTerm && !text.includes(searchTerm)) {
                    shouldShow = false;
                }

                card.style.display = shouldShow ? 'block' : 'none';
            });

            // Mettre à jour les boutons de filtre
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('onclick') === `filterCompetences('${filter}')`) {
                    btn.classList.add('active');
                }
            });
        }

        // Rechercher des compétences
        function searchCompetences() {
            const searchTerm = document.querySelector('.search-input').value.toLowerCase();
            if (searchTerm === '') {
                filterCompetences('all');
                return;
            }

            const cards = document.querySelectorAll('.competence-card');
            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(searchTerm) ? 'block' : 'none';
            });

            // Désactiver les filtres de semestre
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
        }

        // Obtenir le texte du statut
        function getStatusText(status) {
            switch(status) {
                case 'ok': return 'Acquis';
                case 'mid': return 'En cours';
                case 'no': return 'Non acquis';
                default: return '';
            }
        }

        // Initialiser le portfolio
        function initPortfolio() {
            generateCompetenceCards();

            // Fermer la modal en cliquant en dehors
            window.onclick = function(event) {
                const modal = document.getElementById('competenceModal');
                if (event.target === modal) {
                    modal.style.display = 'none';
                }
            };
        }

        // Démarrer l'application
        document.addEventListener('DOMContentLoaded', initPortfolio);
    </script>
</body>
</html>
