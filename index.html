<script>
    const auditData = {
        ue13: {
            title: "INGÉNIERIE LOGICIELLE & SYSTÈMES",
            summary: "ANALYSE_S1 : Expertise dominante confirmée. Capacité critique de résolution algorithmique et maîtrise des environnements POSIX.",
            items: [
                {status: "high", res: "SAÉ 1.5 - Traitement de données", desc: "Expertise majeure. Capacité à concevoir un pipeline complet d'analyse, du parsing de fichiers bruts à la génération de statistiques visuelles automatisées."},
                {status: "high", res: "R1.07 - Fondamentaux de la Programmation", desc: "Maîtrise avancée des structures de contrôle, de la gestion mémoire et de l'optimisation algorithmique."},
                {status: "high", res: "R1.08 - Systèmes d'Exploitation", desc: "Compétence solide en environnement Linux. Scripting Bash et gestion des processus système."},
                {status: "mid", res: "R1.09 - Technologies Web", desc: "Acquisition des bases HTML/CSS. Axe de développement identifié sur les frameworks dynamiques."}
            ]
        },
        ue12: {
            title: "SCIENCES APPLIQUÉES & MATHÉMATIQUES",
            summary: "ANALYSE_S1 : Rigueur analytique élevée. Utilisation de l'abstraction mathématique pour la résolution de problématiques de transmission.",
            items: [
                {status: "high", res: "R1.13 - Mathématiques du Signal", desc: "Excellente maîtrise des outils de transformation et d'analyse spectrale. Capacité de modélisation supérieure."},
                {status: "high", res: "R1.14 - Mathématiques des Transmissions", desc: "Compréhension fine des probabilités et calculs appliqués aux flux de données numériques."},
                {status: "mid", res: "R1.05 - Supports de Transmission", desc: "Connaissance opérationnelle des médias physiques (fibre, cuivre, hertzien) et de leurs contraintes de propagation."}
            ]
        },
        ue11: {
            title: "RÉSEAUX & INFRASTRUCTURES",
            summary: "ANALYSE_S1 : Capacité opérationnelle de déploiement. Maintenance et sécurisation des flux de données en environnement LAN.",
            items: [
                {status: "mid", res: "R1.03 - Réseaux Locaux & Équipements", desc: "Compétence opérationnelle sur la configuration de switchs et la segmentation de réseaux (VLAN)."},
                {status: "mid", res: "R1.06 - Architecture des Systèmes", desc: "Compréhension des interactions matérielles et logicielles au sein des infrastructures numériques."},
                {status: "mid", res: "R1.01 - Initiation aux Réseaux", desc: "Maîtrise des protocoles fondamentaux du modèle OSI et de l'adressage IP."}
            ]
        }
    };

    // --- EFFET DE DECRYPTAGE (SCRAMBLE) ---
    class TextScrambler {
        constructor(el) {
            this.el = el;
            this.chars = '!<>-_\\/[]{}—=+*^?#________';
            this.update = this.update.bind(this);
        }
        setText(newText) {
            const oldText = this.el.innerText;
            const length = Math.max(oldText.length, newText.length);
            const promise = new Promise((resolve) => this.resolve = resolve);
            this.queue = [];
            for (let i = 0; i < length; i++) {
                const from = oldText[i] || '';
                const to = newText[i] || '';
                const start = Math.floor(Math.random() * 40);
                const end = start + Math.floor(Math.random() * 40);
                this.queue.push({ from, to, start, end });
            }
            cancelAnimationFrame(this.frameRequest);
            this.frame = 0;
            this.update();
            return promise;
        }
        update() {
            let output = '';
            let complete = 0;
            for (let i = 0, n = this.queue.length; i < n; i++) {
                let { from, to, start, end, char } = this.queue[i];
                if (this.frame >= end) {
                    complete++;
                    output += to;
                } else if (this.frame >= start) {
                    if (!char || Math.random() < 0.28) {
                        char = this.chars[Math.floor(Math.random() * this.chars.length)];
                        this.queue[i].char = char;
                    }
                    output += `<span class="decrypt-txt">${char}</span>`;
                } else {
                    output += from;
                }
            }
            this.el.innerHTML = output;
            if (complete === this.queue.length) {
                this.resolve();
            } else {
                this.frameRequest = requestAnimationFrame(this.update);
                this.frame++;
            }
        }
    }

    // --- LOGIQUE MODALE ---
    function openAudit(ue) {
        const modal = document.getElementById('modal-audit');
        const body = document.getElementById('modal-body');
        const data = auditData[ue];
        
        // Reset and show modal
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';

        // Construction du squelette
        body.innerHTML = `
            <p class="ue-tag" id="modal-tag">// INITIALISATION_AUDIT...</p>
            <h2 id="modal-title" style="font-size:2.5rem; line-height:1; margin-bottom:20px;"></h2>
            <p id="modal-summary" style="font-size:1.1rem; color:var(--text-main); margin-bottom:30px; border-bottom:1px solid var(--border); padding-bottom:30px;"></p>
            <div class="audit-section" id="audit-items-container"></div>
        `;

        // Animation du titre et du résumé
        const scramblerTitle = new TextScrambler(document.getElementById('modal-title'));
        const scramblerSummary = new TextScrambler(document.getElementById('modal-summary'));
        
        scramblerTitle.setText(data.title);
        setTimeout(() => scramblerSummary.setText(data.summary), 300);

        // Animation "Stagger" des items
        const container = document.getElementById('audit-items-container');
        data.items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'audit-item';
            div.innerHTML = `
                <span class="status-tag ${item.status === 'high' ? 'status-high' : 'status-mid'}">
                    ${item.status === 'high' ? 'NIVEAU_AVANCÉ' : 'ACQUIS_OPÉRATIONNEL'}
                </span>
                <span class="res-name">> ${item.res}</span>
                <span class="res-desc">${item.desc}</span>
            `;
            container.appendChild(div);
            
            // Apparition décalée
            setTimeout(() => {
                div.classList.add('show');
            }, 600 + (index * 150));
        });
    }

    function closeAudit() {
        document.getElementById('modal-audit').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // --- EFFET DE SURVOL DES CARTES ---
    document.querySelectorAll('.skill-card').forEach(card => {
        card.addEventListener('mouseenter', () => {
            const title = card.querySelector('h2');
            const originalText = title.innerText;
            const scrambler = new TextScrambler(title);
            scrambler.setText(originalText);
        });
    });
</script>
